name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Build, Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com/
          scope: '@loupeteam'

      - name: Install dependencies
        # Use `npm install` (not `npm ci`) to work around npm/cli#4828: lockfiles
        # generated on Windows don't include the linux-specific rollup native
        # binary, causing `npm ci` to leave it missing. `npm install` resolves
        # platform-specific optional deps fresh.
        # NODE_AUTH_TOKEN authenticates against GitHub Packages for @loupeteam scope.
        run: |
          rm -f package-lock.json
          npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        # CI=true causes vitest.config.ts to exclude integration tests that need
        # a live OPC UA server on localhost:8443.
        run: npx vitest run
